<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Crossword</title>
  <style>
    :root{
      --cell: 26px;     /* пересчитывается JS только от ширины */
      --border: 2px;
    }

    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #fff;
      color: #111;
      overflow: hidden;                 /* никаких скроллов */
      -webkit-text-size-adjust: 100%;
      position: fixed;                  /* чтобы iOS не «подскролливал» при фокусе */
      inset: 0;
    }

    .app{
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .top{
      padding: 14px 12px 10px;
      max-width: 980px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    .panel{
      border: 1px solid #e6e6e6;
      border-radius: 16px;
      padding: 12px;
      background: #fff;
    }

    .title{
      font-size: 26px;
      line-height: 1.1;
      margin: 4px 0 6px;
    }
    .note{
      font-size: 13px;
      color: #555;
      margin: 0 0 10px;
    }

    .actions{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button{
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
    }
    .msg{
      font-size: 14px;
      color: #111;
    }

    /* Игровая зона: без скролла, всё влезает за счёт размера клетки */
    .game{
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 6px 12px 14px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .wrap{
      max-width: 980px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .gridHost{
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: visible; /* ничего не режем */
    }

    table{
      border-collapse: collapse;
      table-layout: fixed;
      background: transparent;
    }

    td{
      width: var(--cell);
      height: var(--cell);
      min-width: var(--cell);
      min-height: var(--cell);
      padding: 0;
      box-sizing: border-box;
      text-align: center;
      vertical-align: middle;
    }

    td.block{
      border: none !important;
      background: transparent !important;
    }

    td.fill{
      border: var(--border) solid #111;
      background: #fff;
    }

    td.gap{
      border: var(--border) solid #111;
      background: #d9d9d9;
    }

    td.active{
      background: #fff2b3;
    }
    td.active.gap{
      background: #d9d9d9;
    }

    input.cell{
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      padding: 0;
      margin: 0;
      display: block;
      box-sizing: border-box;
      background: transparent;

      text-transform: uppercase;
      text-align: center;

      font-size: 16px;        /* iOS не зумит */
      line-height: var(--cell);
      caret-color: #111;
    }

    /* Подсказка сразу под кроссвордом (видимая, без фиксации снизу) */
    .inlineClue{
      width: 100%;
      border: 1px solid #e6e6e6;
      border-radius: 16px;
      padding: 12px;
      background: #fff;
      box-sizing: border-box;
    }

    .clueTop{
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .chip{
      display: inline-block;
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      color: #222;
      background: #fff;
    }

    .clueText{
      font-size: 14px;
      line-height: 1.25;
      color: #111;
    }

    /* Режим embed: скрываем заголовок/кнопки полностью */
    .embed .panel{ display:none; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="top">
      <div class="panel">
        <div class="title">Кроссворд (EN)</div>
        <div class="note">Серые клетки — пробелы между словами. Тап по клетке выбирает слово, повторный тап переключает направление.</div>
        <div class="actions">
          <button id="checkBtn">Проверить</button>
          <button id="clearBtn">Очистить</button>
          <div class="msg" id="msg"></div>
        </div>
      </div>
    </div>

    <div class="game">
      <div class="wrap">
        <div class="gridHost" id="gridHost"></div>

        <div class="inlineClue">
          <div class="clueTop">
            <span class="chip" id="clueDir">—</span>
          </div>
          <div class="clueText" id="clueText">Нажмите на слово, чтобы увидеть подсказку</div>
        </div>
      </div>
    </div>
  </div>

<script>
  // embed: ?embed=1 (или если вставлено iframe)
  const params = new URLSearchParams(location.search);
  const isEmbed = params.get("embed") === "1" || (window.self !== window.top);
  if (isEmbed) document.getElementById("app").classList.add("embed");

  const crossword = {
    width: 34,
    height: 13,
    gaps: [
      { row: 9, col: 18 },
      { row: 9, col: 23 },
      { row: 9, col: 27 }
    ],
    entries: [
      { id: 1, dir:"across", row: 6, col: 2,  answer:"MAYFLOWER", clue:"Полное имя Рубика" },
      { id: 2, dir:"down",   row: 6, col: 2,  answer:"MADMEN",    clue:"Новый офисик" },
      { id: 3, dir:"down",   row: 2, col: 10, answer:"VIBURNUM",  clue:"Другое название калины (англ.)" },
      { id: 4, dir:"across", row: 2, col: 10, answer:"VPN",       clue:"Платное изобретение Яши и бесплатное Песочка" },

      // Фраза одной подсказкой, но разбита серыми клетками
      { id: 12,   dir:"across", row: 9, col: 10, answer:"MESSAGES", group:"phrase12", clue:"Название песни, под которую красиво катаются на роликах" },
      { id: 1202, dir:"across", row: 9, col: 19, answer:"FROM",     group:"phrase12", clue:"Название песни, под которую красиво катаются на роликах" },
      { id: 1203, dir:"across", row: 9, col: 24, answer:"THE",      group:"phrase12", clue:"Название песни, под которую красиво катаются на роликах" },
      { id: 1204, dir:"across", row: 9, col: 28, answer:"STARS",    group:"phrase12", clue:"Название песни, под которую красиво катаются на роликах" },

      { id: 5, dir:"down", row: 7, col: 14, answer:"PLAY", clue:"Кнопка на пульте для включения кино" },
      { id: 6, dir:"down", row: 9, col: 12, answer:"SPF",  clue:"То, что Эльза не захотела покупать Владу" }
    ]
  };

  const W = crossword.width;
  const H = crossword.height;

  function normalize(s){ return (s||"").toString().trim().toUpperCase(); }

  const gapSet = new Set((crossword.gaps||[]).map(g=>`${g.row-1},${g.col-1}`));
  const mask = Array.from({length:H}, ()=> Array.from({length:W}, ()=> false));

  function assertInBounds(r,c,label){
    if(r<0||r>=H||c<0||c>=W) throw new Error(`${label} выходит за границы ${W}x${H}`);
  }

  for(const key of gapSet){
    const [r,c]=key.split(",").map(Number);
    assertInBounds(r,c,"gap");
    mask[r][c]=true;
  }

  function placeWord(e){
    const w = normalize(e.answer);
    for(let i=0;i<w.length;i++){
      const r = (e.row-1) + (e.dir==="down"? i : 0);
      const c = (e.col-1) + (e.dir==="across"? i : 0);
      assertInBounds(r,c,`Слово "${e.answer}"`);
      if(gapSet.has(`${r},${c}`)) throw new Error(`Слово "${e.answer}" попало в серую клетку`);
      mask[r][c]=true;
    }
  }
  crossword.entries.forEach(placeWord);

  // Кадрирование по использованным клеткам
  let minR=H-1, maxR=0, minC=W-1, maxC=0;
  for(let r=0;r<H;r++){
    for(let c=0;c<W;c++){
      if(mask[r][c]){
        minR = Math.min(minR, r);
        maxR = Math.max(maxR, r);
        minC = Math.min(minC, c);
        maxC = Math.max(maxC, c);
      }
    }
  }
  const PAD = 1;
  minR = Math.max(0, minR-PAD);
  minC = Math.max(0, minC-PAD);
  maxR = Math.min(H-1, maxR+PAD);
  maxC = Math.min(W-1, maxC+PAD);

  const colsVisible = (maxC - minC + 1);
  const rowsVisible = (maxR - minR + 1);

  // Рендер таблицы
  const gridHost = document.getElementById("gridHost");
  const table = document.createElement("table");

  const inputByKey = new Map();
  const tdByKey = new Map();

  for(let r=minR;r<=maxR;r++){
    const tr=document.createElement("tr");
    for(let c=minC;c<=maxC;c++){
      const td=document.createElement("td");
      const key = `${r},${c}`;

      if(!mask[r][c]){
        td.className="block";
      } else if(gapSet.has(key)){
        td.className="gap";
      } else {
        td.className="fill";
        const inp=document.createElement("input");
        inp.className="cell";
        inp.maxLength=1;
        inp.inputMode="text";
        inp.autocomplete="off";
        inp.spellcheck=false;

        inp.addEventListener("input", ()=>{
          inp.value = normalize(inp.value).slice(0,1);
        });

        td.appendChild(inp);
        inputByKey.set(key, inp);
      }

      tdByKey.set(key, td);
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
  gridHost.appendChild(table);

  // Размер клетки: только от ширины контейнера (ничего не «прыгает» от клавиатуры)
  function computeCellSize(){
    const hostW = Math.floor(gridHost.clientWidth);
    // небольшой запас, чтобы точно не «подрезало» на пикселях
    let cell = Math.floor((hostW - 2) / colsVisible);
    cell = Math.max(16, Math.min(34, cell));
    document.documentElement.style.setProperty("--cell", `${cell}px`);
  }
  computeCellSize();
  window.addEventListener("resize", computeCellSize);

  // Словарь пересечений
  const cellToEntries = new Map();
  function addCellEntry(r,c,entry){
    const key = `${r},${c}`;
    if(!cellToEntries.has(key)) cellToEntries.set(key, []);
    cellToEntries.get(key).push(entry);
  }

  crossword.entries.forEach(e=>{
    const w = normalize(e.answer);
    for(let i=0;i<w.length;i++){
      const r = (e.row-1) + (e.dir==="down"? i : 0);
      const c = (e.col-1) + (e.dir==="across"? i : 0);
      addCellEntry(r,c,e);
    }
  });

  const clueDirEl = document.getElementById("clueDir");
  const clueTextEl = document.getElementById("clueText");

  let activeEntry = null;
  let lastTapKey = null;

  function clearActiveHighlight(){
    for(const td of tdByKey.values()) td.classList.remove("active");
  }

  function highlightEntry(entry){
    const w = normalize(entry.answer);
    for(let i=0;i<w.length;i++){
      const r = (entry.row-1) + (entry.dir==="down"? i : 0);
      const c = (entry.col-1) + (entry.dir==="across"? i : 0);
      const td = tdByKey.get(`${r},${c}`);
      if(td) td.classList.add("active");
    }
  }

  function highlightGroup(groupId){
    clearActiveHighlight();
    for(const e of crossword.entries){
      if(e.group === groupId) highlightEntry(e);
    }
  }

  function showClue(entry){
    clueDirEl.textContent = entry.dir === "across" ? "По горизонтали" : "По вертикали";
    clueTextEl.textContent = entry.clue;

    if(entry.group) highlightGroup(entry.group);
    else { clearActiveHighlight(); highlightEntry(entry); }

    activeEntry = entry;
  }

  function focusNoJump(inp){
    try { inp.focus({ preventScroll: true }); }
    catch { inp.focus(); }
    // страховка от iOS «самопрокрутки»
    setTimeout(()=>window.scrollTo(0,0), 0);
  }

  // Выбор слова:
  // - тап по той же клетке второй раз переключает направление, если есть 2 варианта
  // - фокус от автоперехода слово не меняет
  function pickEntryForTap(key){
    const list = cellToEntries.get(key) || [];
    if(list.length === 0) return null;

    if(lastTapKey === key && list.length > 1){
      // переключаем направление
      if(activeEntry){
        const idx = list.findIndex(x => x === activeEntry);
        if(idx >= 0) return list[(idx + 1) % list.length];
      }
      return list[1];
    }

    // по умолчанию берём горизонталь, если есть
    const across = list.find(x => x.dir === "across");
    return across || list[0];
  }

  function keepActiveOnFocus(key){
    if(!activeEntry) return;
    const list = cellToEntries.get(key) || [];
    const okSame = list.some(x => x === activeEntry);
    const okGroup = activeEntry.group && list.some(x => x.group === activeEntry.group);
    if(okSame || okGroup){
      // просто подсветим текущее
      if(activeEntry.group) highlightGroup(activeEntry.group);
      else { clearActiveHighlight(); highlightEntry(activeEntry); }
      return;
    }
  }

  // Автопереход по активному слову/фразе
  function getPathCells(entry){
    const keys = [];
    const w = normalize(entry.answer);
    for(let i=0;i<w.length;i++){
      const r = (entry.row-1) + (entry.dir==="down"? i : 0);
      const c = (entry.col-1) + (entry.dir==="across"? i : 0);
      keys.push(`${r},${c}`);
    }
    return keys;
  }

  function moveInActive(entry, currentKey, delta){
    if(!entry) return;

    // если это фраза — двигаемся по всем частям подряд
    if(entry.group){
      const parts = crossword.entries
        .filter(e=>e.group===entry.group && e.dir===entry.dir)
        .sort((a,b)=> (a.row-b.row) || (a.col-b.col));
      const allKeys = [];
      for(const p of parts) allKeys.push(...getPathCells(p));

      const i = allKeys.indexOf(currentKey);
      const next = allKeys[i + delta];
      if(next && inputByKey.get(next)) focusNoJump(inputByKey.get(next));
      return;
    }

    const keys = getPathCells(entry);
    const i = keys.indexOf(currentKey);
    const next = keys[i + delta];
    if(next && inputByKey.get(next)) focusNoJump(inputByKey.get(next));
  }

  for(const [key, inp] of inputByKey.entries()){
    function selectByTap(){
      lastTapKey = key;
      const entry = pickEntryForTap(key);
      if(entry) showClue(entry);
      focusNoJump(inp);
    }

    function onFocusOnly(){
      keepActiveOnFocus(key);
      focusNoJump(inp);
    }

    inp.addEventListener("click", selectByTap);
    inp.addEventListener("touchend", selectByTap, {passive:true});
    inp.addEventListener("focus", onFocusOnly);

    inp.addEventListener("input", () => {
      if(!activeEntry) return;
      const v = normalize(inp.value);
      if(v && v.length === 1){
        moveInActive(activeEntry, key, +1);
      }
    });

    inp.addEventListener("keydown", (e) => {
      if(e.key === "Backspace"){
        if(inp.value === "" && activeEntry){
          e.preventDefault();
          moveInActive(activeEntry, key, -1);
        }
      }
    });
  }

  // Проверка/очистка
  function getCellValueKey(key){
    const inp = inputByKey.get(key);
    return inp ? normalize(inp.value) : "";
  }

  function check(){
    let ok=0, total=0;
    crossword.entries.forEach(e=>{
      const w = normalize(e.answer);
      for(let i=0;i<w.length;i++){
        const r = (e.row-1) + (e.dir==="down"? i : 0);
        const c = (e.col-1) + (e.dir==="across"? i : 0);
        total++;
        if(getCellValueKey(`${r},${c}`) === w[i]) ok++;
      }
    });
    document.getElementById("msg").textContent =
      (ok===total && total>0) ? "Готово! Всё верно 🎉" : `Верно: ${ok} из ${total} букв`;
  }

  function clearAll(){
    for(const inp of inputByKey.values()) inp.value = "";
    document.getElementById("msg").textContent = "";
    clearActiveHighlight();
    activeEntry = null;
    lastTapKey = null;
    clueDirEl.textContent = "—";
    clueTextEl.textContent = "Нажмите на слово, чтобы увидеть подсказку";
  }

  document.getElementById("checkBtn").addEventListener("click", check);
  document.getElementById("clearBtn").addEventListener("click", clearAll);
</script>
</body>
</html>
