<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Кроссворд</title>
  <style>
    :root{
      --cell: 28px;     /* пересчитывается JS */
      --border: 2px;
      --kb: 0px;        /* высота клавиатуры */
    }

    html, body{ height: 100%; }

    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      background: #fff;
      color: #111;
      overflow: hidden; /* как в приложении */
      -webkit-text-size-adjust: 100%;
    }

    .screen{
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .top{
      padding: 14px 12px 0;
      max-width: 980px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    .panel{
      border: 1px solid #e6e6e6;
      border-radius: 16px;
      padding: 12px;
      background: #fff;
    }

    .title{
      font-size: 26px;
      line-height: 1.1;
      margin: 4px 0 6px;
    }

    .note{
      font-size: 13px;
      color: #555;
      margin: 0 0 12px;
    }

    .actions{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button{
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
    }

    .msg{
      font-size: 14px;
      color: #111;
      align-self: center;
    }

    /* Игровая область: занимает весь экран, а снизу резерв под плашку + клавиатуру */
    .gameArea{
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px 12px calc(110px + var(--kb) + env(safe-area-inset-bottom)) 12px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .gridWrap{
      max-width: 980px;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #grid{
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    table{
      border-collapse: collapse;
      table-layout: fixed;
    }

    td{
      width: var(--cell);
      height: var(--cell);
      min-width: var(--cell);
      min-height: var(--cell);
      padding: 0;
      box-sizing: border-box;
      text-align: center;
      vertical-align: middle;
    }

    td.block{
      border: none !important;
      background: transparent !important;
    }

    td.fill{
      border: var(--border) solid #111;
      background: #fff;
    }

    td.gap{
      border: var(--border) solid #111;
      background: #d9d9d9;
    }

    td.active{
      background: #fff2b3;
    }
    td.active.gap{
      background: #d9d9d9;
    }

    input.cell{
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      padding: 0;
      margin: 0;
      display: block;
      box-sizing: border-box;

      background: transparent;
      text-transform: uppercase;
      text-align: center;

      font-size: 16px;          /* iOS не зумит */
      line-height: var(--cell);
      caret-color: #111;
    }

    /* Плашка подсказки: фиксирована и поднимается над клавиатурой */
    .cluebar{
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(var(--kb) + env(safe-area-inset-bottom));
      background: #fff;
      border-top: 1px solid #ddd;
      padding: 10px 12px;
      box-sizing: border-box;
      z-index: 9999;
    }

    .clueInner{
      max-width: 980px;
      margin: 0 auto;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
    }

    .cluebar-top{
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .cluechip{
      display: inline-block;
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      color: #222;
      background: #fff;
    }

    .cluebar-text{
      font-size: 14px;
      line-height: 1.25;
      color: #111;
    }

    .embed .title,
    .embed .note,
    .embed .actions{
      display: none;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="top">
      <div class="panel" id="panel">
        <div class="title">Кроссворд (EN)</div>
        <div class="note">Серые клетки — пробелы между словами. Нажмите на слово, чтобы увидеть подсказку.</div>

        <div class="actions">
          <button id="checkBtn">Проверить</button>
          <button id="clearBtn">Очистить</button>
          <div class="msg" id="msg"></div>
        </div>
      </div>
    </div>

    <div class="gameArea">
      <div class="gridWrap" id="gridWrap">
        <div id="grid"></div>
      </div>
    </div>
  </div>

  <div class="cluebar" id="clueBar">
    <div class="clueInner">
      <div class="cluebar-top">
        <span id="clueDir" class="cluechip">—</span>
      </div>
      <div id="clueText" class="cluebar-text">Нажмите на слово, чтобы увидеть подсказку</div>
    </div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const isEmbed = params.get("embed") === "1" || (window.self !== window.top);
  if (isEmbed) document.getElementById("panel").classList.add("embed");

  const crossword = {
    width: 33,
    height: 13,
    gaps: [
      { row: 9, col: 18 },
      { row: 9, col: 23 },
      { row: 9, col: 27 },
    ],
    entries: [
      { id: 1, dir:"across", row: 6, col: 2,  answer:"MAYFLOWER", clue:"Полное имя Рубика" },
      { id: 2, dir:"down",   row: 6, col: 2,  answer:"MADMEN",    clue:"Новый офисик" },
      { id: 3, dir:"down",   row: 2, col: 10, answer:"VIBURNUM",  clue:"Другое название калины (англ.)" },
      { id: 4, dir:"across", row: 2, col: 10, answer:"VPN",       clue:"Платное изобретение Яши и бесплатное Песочка" },

      { id: 12,   dir:"across", row: 9, col: 10, answer:"MESSAGES", group:"phrase12",
        clue:"Название песни, под которую красиво катаются на роликах" },
      { id: 1202, dir:"across", row: 9, col: 19, answer:"FROM", group:"phrase12",
        clue:"Название песни, под которую красиво катаются на роликах" },
      { id: 1203, dir:"across", row: 9, col: 24, answer:"THE", group:"phrase12",
        clue:"Название песни, под которую красиво катаются на роликах" },
      { id: 1204, dir:"across", row: 9, col: 28, answer:"STARS", group:"phrase12",
        clue:"Название песни, под которую красиво катаются на роликах" },

      { id: 5, dir:"down", row: 7, col: 14, answer:"PLAY", clue:"Кнопка на пульте для включения кино" },
      { id: 6, dir:"down", row: 9, col: 12, answer:"SPF",  clue:"То, что Эльза не захотела покупать Владу" }
    ]
  };

  const W = crossword.width;
  const H = crossword.height;

  function normalize(s){ return (s||"").toString().trim().toUpperCase(); }

  const gapSet = new Set((crossword.gaps||[]).map(g=>`${g.row-1},${g.col-1}`));
  const mask = Array.from({length:H}, ()=> Array.from({length:W}, ()=> false));

  function assertInBounds(r,c,label){
    if(r<0||r>=H||c<0||c>=W) throw new Error(`${label} выходит за границы ${W}x${H}`);
  }

  for(const key of gapSet){
    const [r,c]=key.split(",").map(Number);
    assertInBounds(r,c,"gap");
    mask[r][c]=true;
  }

  function placeWord(e){
    const w = normalize(e.answer);
    for(let i=0;i<w.length;i++){
      const r = (e.row-1) + (e.dir==="down"? i : 0);
      const c = (e.col-1) + (e.dir==="across"? i : 0);
      assertInBounds(r,c,`Слово "${e.answer}"`);
      if(gapSet.has(`${r},${c}`)) throw new Error(`Слово "${e.answer}" попало в серую клетку`);
      mask[r][c]=true;
    }
  }
  crossword.entries.forEach(placeWord);

  // кадрирование
  let minR=H-1, maxR=0, minC=W-1, maxC=0;
  for(let r=0;r<H;r++){
    for(let c=0;c<W;c++){
      if(mask[r][c]){
        minR = Math.min(minR, r);
        maxR = Math.max(maxR, r);
        minC = Math.min(minC, c);
        maxC = Math.max(maxC, c);
      }
    }
  }
  const PAD = 1;
  minR = Math.max(0, minR-PAD);
  minC = Math.max(0, minC-PAD);
  maxR = Math.min(H-1, maxR+PAD);
  maxC = Math.min(W-1, maxC+PAD);

  const colsVisible = (maxC - minC + 1);
  const rowsVisible = (maxR - minR + 1);

  // render
  const gridEl = document.getElementById("grid");
  const table = document.createElement("table");

  const inputByKey = new Map();
  const tdByKey = new Map();

  for(let r=minR;r<=maxR;r++){
    const tr=document.createElement("tr");
    for(let c=minC;c<=maxC;c++){
      const td=document.createElement("td");
      const key = `${r},${c}`;

      if(!mask[r][c]){
        td.className="block";
      } else if(gapSet.has(key)){
        td.className="gap";
      } else {
        td.className="fill";
        const inp=document.createElement("input");
        inp.className="cell";
        inp.maxLength=1;
        inp.inputMode="text";
        inp.autocomplete="off";
        inp.spellcheck=false;

        inp.addEventListener("input", ()=>{
          inp.value = normalize(inp.value).slice(0,1);
        });

        td.appendChild(inp);
        inputByKey.set(key, inp);
      }

      tdByKey.set(key, td);
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
  gridEl.appendChild(table);

  // Подбор размера клетки по ширине И по высоте (чтобы не обрезалось)
  function computeCellSize(){
    const wrap = document.getElementById("gridWrap");
    const availableW = Math.floor(wrap.clientWidth);

    // доступная высота = высота игровой зоны (gridWrap) минус небольшой запас
    const availableH = Math.floor(wrap.clientHeight);

    // по ширине
    const cellW = Math.floor(availableW / colsVisible);
    // по высоте
    const cellH = Math.floor(availableH / rowsVisible);

    // берём минимум, чтобы точно влезло
    let cell = Math.min(cellW, cellH);

    // адекватные границы
    cell = Math.max(18, Math.min(36, cell));

    document.documentElement.style.setProperty("--cell", `${cell}px`);
  }

  // Клавиатура через visualViewport
  function updateKeyboardOffset(){
    const vv = window.visualViewport;
    if(!vv){
      document.documentElement.style.setProperty("--kb", "0px");
      return;
    }
    const kb = Math.max(0, Math.round(window.innerHeight - vv.height - vv.offsetTop));
    document.documentElement.style.setProperty("--kb", `${kb}px`);
  }

  function relayout(){
    updateKeyboardOffset();
    // после обновления padding снизу — пересчитать cell
    requestAnimationFrame(computeCellSize);
  }

  relayout();
  window.addEventListener("resize", relayout);
  if(window.visualViewport){
    window.visualViewport.addEventListener("resize", relayout);
    window.visualViewport.addEventListener("scroll", relayout);
  }

  // подсказки
  const clueDir = document.getElementById("clueDir");
  const clueText = document.getElementById("clueText");

  const cellToEntries = new Map();
  function addCellEntry(r,c,entry){
    const key = `${r},${c}`;
    if(!cellToEntries.has(key)) cellToEntries.set(key, []);
    cellToEntries.get(key).push(entry);
  }

  crossword.entries.forEach(e=>{
    const w = normalize(e.answer);
    for(let i=0;i<w.length;i++){
      const r = (e.row-1) + (e.dir==="down"? i : 0);
      const c = (e.col-1) + (e.dir==="across"? i : 0);
      addCellEntry(r,c,e);
    }
  });

  let activeEntry = null;
  let lastTapKey = null;

  function clearActiveHighlight(){
    for(const td of tdByKey.values()) td.classList.remove("active");
  }
  function highlightEntry(entry){
    const w = normalize(entry.answer);
    for(let i=0;i<w.length;i++){
      const r = (entry.row-1) + (entry.dir==="down"? i : 0);
      const c = (entry.col-1) + (entry.dir==="across"? i : 0);
      const td = tdByKey.get(`${r},${c}`);
      if(td) td.classList.add("active");
    }
  }
  function highlightGroup(groupId){
    clearActiveHighlight();
    for(const e of crossword.entries){
      if(e.group === groupId) highlightEntry(e);
    }
  }

  function showClue(entry){
    clueDir.textContent = entry.dir === "across" ? "По горизонтали" : "По вертикали";
    clueText.textContent = entry.clue;

    if(entry.group) highlightGroup(entry.group);
    else { clearActiveHighlight(); highlightEntry(entry); }

    activeEntry = entry;
  }

  function pickEntryForCellKey(key){
    const list = cellToEntries.get(key) || [];
    if(list.length === 0) return null;

    if(lastTapKey === key && list.length > 1 && activeEntry){
      const idx = list.findIndex(x => x === activeEntry);
      if(idx >= 0) return list[(idx + 1) % list.length];
      return list[1];
    }

    const across = list.find(x => x.dir === "across");
    return across || list[0];
  }

  function focusNoJump(inp){
    try { inp.focus({ preventScroll: true }); }
    catch { inp.focus(); }
  }

  // ===== Автопереход по клеткам как в приложениях =====
  function getPathCells(entry){
    // возвращает список ключей клеток слова, пропуская gap (у нас gap внутри слова не бывает)
    const keys = [];
    const w = normalize(entry.answer);
    for(let i=0;i<w.length;i++){
      const r = (entry.row-1) + (entry.dir==="down"? i : 0);
      const c = (entry.col-1) + (entry.dir==="across"? i : 0);
      const key = `${r},${c}`;
      keys.push(key);
    }
    return keys;
  }

  function getActiveKeyIndex(entry, currentKey){
    const keys = getPathCells(entry);
    return { keys, idx: keys.indexOf(currentKey) };
  }

  function moveInActive(entry, currentKey, delta){
    if(!entry) return;
    // если группа (фраза) — двигаемся по всей группе слева направо (как одно слово)
    if(entry.group){
      const parts = crossword.entries.filter(e=>e.group===entry.group && e.dir===entry.dir)
        .sort((a,b)=> (a.row-b.row) || (a.col-b.col));
      const allKeys = [];
      for(const p of parts) allKeys.push(...getPathCells(p));

      const i = allKeys.indexOf(currentKey);
      const next = allKeys[i + delta];
      if(next && inputByKey.get(next)){
        focusNoJump(inputByKey.get(next));
      }
      return;
    }

    const {keys, idx} = getActiveKeyIndex(entry, currentKey);
    const next = keys[idx + delta];
    if(next && inputByKey.get(next)){
      focusNoJump(inputByKey.get(next));
    }
  }

  for(const [key, inp] of inputByKey.entries()){
    const selectHandler = () => {
      lastTapKey = key;
      const entry = pickEntryForCellKey(key);
      if(entry) showClue(entry);
      focusNoJump(inp);
    };

    inp.addEventListener("click", selectHandler);
    inp.addEventListener("focus", selectHandler);
    inp.addEventListener("touchend", selectHandler, {passive:true});

    // автопереход вперёд после ввода
    inp.addEventListener("input", () => {
      if(!activeEntry) return;
      const v = normalize(inp.value);
      if(v && v.length === 1){
        moveInActive(activeEntry, key, +1);
      }
    });

    // backspace: если пусто — шаг назад; если не пусто — просто очистится
    inp.addEventListener("keydown", (e) => {
      if(e.key === "Backspace"){
        if(inp.value === "" && activeEntry){
          e.preventDefault();
          moveInActive(activeEntry, key, -1);
        }
      }
      // стрелочки (для удобства на десктопе)
      if(e.key === "ArrowRight" && activeEntry){ e.preventDefault(); moveInActive(activeEntry, key, +1); }
      if(e.key === "ArrowLeft"  && activeEntry){ e.preventDefault(); moveInActive(activeEntry, key, -1); }
      if(e.key === "ArrowDown"  && activeEntry){ e.preventDefault(); moveInActive(activeEntry, key, +1); }
      if(e.key === "ArrowUp"    && activeEntry){ e.preventDefault(); moveInActive(activeEntry, key, -1); }
    });
  }

  // check/clear
  function getCellValueKey(key){
    const inp = inputByKey.get(key);
    return inp ? normalize(inp.value) : "";
  }

  function check(){
    let ok=0, total=0;
    crossword.entries.forEach(e=>{
      const w = normalize(e.answer);
      for(let i=0;i<w.length;i++){
        const r = (e.row-1) + (e.dir==="down"? i : 0);
        const c = (e.col-1) + (e.dir==="across"? i : 0);
        total++;
        if(getCellValueKey(`${r},${c}`) === w[i]) ok++;
      }
    });
    document.getElementById("msg").textContent =
      (ok===total && total>0) ? "Готово! Всё верно 🎉" : `Верно: ${ok} из ${total} букв`;
  }

  function clearAll(){
    for(const inp of inputByKey.values()) inp.value = "";
    document.getElementById("msg").textContent = "";
    clearActiveHighlight();
    activeEntry = null;
    lastTapKey = null;
    clueDir.textContent = "—";
    clueText.textContent = "Нажмите на слово, чтобы увидеть подсказку";
  }

  document.getElementById("checkBtn").addEventListener("click", check);
  document.getElementById("clearBtn").addEventListener("click", clearAll);
</script>
</body>
</html>
