<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Crossword</title>

<style>
:root{
  --cell: 26px;
  --border: 2px;
}

html, body{
  margin:0;
  height:100%;
  background:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  -webkit-text-size-adjust:100%;
}

.screen{
  height:100svh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.top{
  padding:14px 12px 10px;
  max-width:980px;
  margin:0 auto;
  width:100%;
  box-sizing:border-box;
}

.panel{
  border:1px solid #e6e6e6;
  border-radius:16px;
  padding:12px;
}

.title{
  font-size:26px;
  margin:4px 0 6px;
}

.note{
  font-size:13px;
  color:#555;
  margin-bottom:10px;
}

.actions{
  margin-top:6px;
}

button{
  border:1px solid #ddd;
  background:#fff;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
  cursor:pointer;
}

.gameArea{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:6px 12px 14px;
  box-sizing:border-box;
}

#grid{
  display:flex;
  justify-content:center;
}

table{
  border-collapse:collapse;
}

td{
  width:var(--cell);
  height:var(--cell);
  text-align:center;
  vertical-align:middle;
}

td.block{
  background:transparent;
}

td.fill{
  border:var(--border) solid #111;
}

td.gap{
  border:var(--border) solid #111;
  background:#d9d9d9;
}

td.active{
  background:#fff2b3;
}

td.correct{
  background:#e8f0fe;
}

td.correct input{
  color:#1a73e8;
  font-weight:600;
}

input{
  width:100%;
  height:100%;
  border:0;
  outline:none;
  text-align:center;
  text-transform:uppercase;
  font-size:16px;
  background:transparent;
}

.inlineClue{
  width:100%;
  max-width:980px;
  margin-top:14px;
  border:1px solid #ddd;
  border-radius:12px;
  padding:10px 12px;
}

.cluechip{
  border:1px solid #ddd;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
  margin-bottom:6px;
  display:inline-block;
}

.clueText{
  font-size:14px;
}
</style>
</head>

<body>
<div class="screen">

<div class="top">
  <div class="panel">
    <div class="title">Кроссворд (EN)</div>
    <div class="note">Серые клетки — пробелы между словами.</div>
    <div class="actions">
      <button id="clearBtn">Очистить</button>
    </div>
  </div>
</div>

<div class="gameArea">
  <div id="grid"></div>

  <div class="inlineClue">
    <span id="clueDir" class="cluechip">—</span>
    <div id="clueText" class="clueText">Нажмите на слово</div>
  </div>
</div>

</div>

<script>
function normalize(s){ return (s||"").toString().trim().toUpperCase(); }

const crossword={
  width:23,
  height:14,
  gaps:[
    {row:14,col:9},
    {row:14,col:14},
    {row:14,col:18}
  ],
  entries:[
    {id:101,dir:"across",row:3,col:1,answer:"PLAY",clue:"Кнопка на пульте для включения кино"},
    {id:102,dir:"down",row:2,col:1,answer:"SPF",clue:"То, чем Эльза запретила пользоваться Владу на Бали"},
    {id:103,dir:"down",row:2,col:3,answer:"MADMEN",clue:"Новый офисик"},
    {id:104,dir:"across",row:5,col:3,answer:"MAYFLOWER",clue:"Полное имя Рубика"},
    {id:105,dir:"across",row:7,col:1,answer:"VPN",clue:"Платное изобретение Яши и бесплатное Песочка"},
    {id:106,dir:"down",row:7,col:1,answer:"VIBURNUM",clue:"Другое название калины, не обзывательство (!), реальное название"},
    {id:201,dir:"across",row:14,col:1,answer:"MESSAGES",group:"phrase",clue:"Под эту песню красиво катаются на роликах"},
    {id:202,dir:"across",row:14,col:10,answer:"FROM",group:"phrase",clue:"Под эту песню красиво катаются на роликах"},
    {id:203,dir:"across",row:14,col:15,answer:"THE",group:"phrase",clue:"Под эту песню красиво катаются на роликах"},
    {id:204,dir:"across",row:14,col:19,answer:"STARS",group:"phrase",clue:"Под эту песню красиво катаются на роликах"}
  ]
};

const W=crossword.width;
const H=crossword.height;
const gapSet=new Set(crossword.gaps.map(g=>`${g.row-1},${g.col-1}`));
const mask=Array.from({length:H},()=>Array(W).fill(false));

crossword.entries.forEach(e=>{
  const w=normalize(e.answer);
  for(let i=0;i<w.length;i++){
    const r=(e.row-1)+(e.dir==="down"?i:0);
    const c=(e.col-1)+(e.dir==="across"?i:0);
    mask[r][c]=true;
  }
});
gapSet.forEach(k=>{
  const [r,c]=k.split(",").map(Number);
  mask[r][c]=true;
});

let minR=H-1,maxR=0,minC=W-1,maxC=0;
for(let r=0;r<H;r++){
  for(let c=0;c<W;c++){
    if(mask[r][c]){
      minR=Math.min(minR,r);
      maxR=Math.max(maxR,r);
      minC=Math.min(minC,c);
      maxC=Math.max(maxC,c);
    }
  }
}

const colsVisible=maxC-minC+1;
const rowsVisible=maxR-minR+1;

function computeCellSize(){
  const w=document.body.clientWidth;
  const h=document.querySelector(".gameArea").clientHeight-120;
  const cell=Math.min(
    Math.floor(w/colsVisible),
    Math.floor(h/rowsVisible)
  );
  document.documentElement.style.setProperty("--cell",`${Math.max(20,cell)}px`);
}

computeCellSize();
window.addEventListener("resize",computeCellSize);

const grid=document.getElementById("grid");
const table=document.createElement("table");
const inputByKey=new Map();
const tdByKey=new Map();

for(let r=minR;r<=maxR;r++){
  const tr=document.createElement("tr");
  for(let c=minC;c<=maxC;c++){
    const td=document.createElement("td");
    const key=`${r},${c}`;
    if(!mask[r][c]) td.className="block";
    else if(gapSet.has(key)) td.className="gap";
    else{
      td.className="fill";
      const inp=document.createElement("input");
      inp.maxLength=1;
      inp.addEventListener("input",()=>{
        inp.value=normalize(inp.value).slice(0,1);
        updateCorrectMarks();
      });
      td.appendChild(inp);
      inputByKey.set(key,inp);
    }
    tdByKey.set(key,td);
    tr.appendChild(td);
  }
  table.appendChild(tr);
}
grid.appendChild(table);

function getCellValueKey(key){
  const inp=inputByKey.get(key);
  return inp?normalize(inp.value):"";
}

function updateCorrectMarks(){
  tdByKey.forEach(td=>td.classList.remove("correct"));
  crossword.entries.forEach(e=>{
    const w=normalize(e.answer);
    let correct=true;
    for(let i=0;i<w.length;i++){
      const r=(e.row-1)+(e.dir==="down"?i:0);
      const c=(e.col-1)+(e.dir==="across"?i:0);
      const key=`${r},${c}`;
      if(getCellValueKey(key)!==w[i]) correct=false;
    }
    if(correct){
      for(let i=0;i<w.length;i++){
        const r=(e.row-1)+(e.dir==="down"?i:0);
        const c=(e.col-1)+(e.dir==="across"?i:0);
        const key=`${r},${c}`;
        tdByKey.get(key).classList.add("correct");
      }
    }
  });
}

function clearAll(){
  inputByKey.forEach(inp=>inp.value="");
  tdByKey.forEach(td=>td.classList.remove("correct"));
}

document.getElementById("clearBtn").addEventListener("click",clearAll);
</script>
</body>
</html>
