<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Crossword</title>
  <style>
    :root{
      --cell: 26px;      /* будет пересчитано один раз при загрузке */
      --border: 2px;
    }

    html, body{
      height: 100%;
      margin: 0;
      background: #fff;
      color: #111;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    /* Важно: используем 100svh — стабильнее на iOS, меньше скачков */
    .screen{
      height: 100svh;
      display: flex;
      flex-direction: column;
      overflow: hidden; /* без прокрутки страницы */
    }

    .top{
      padding: 14px 12px 10px;
      max-width: 980px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    .panel{
      border: 1px solid #e6e6e6;
      border-radius: 16px;
      padding: 12px;
      background: #fff;
    }

    .title{
      font-size: 26px;
      line-height: 1.1;
      margin: 4px 0 6px;
    }

    .note{
      font-size: 13px;
      color: #555;
      margin: 0 0 10px;
    }

    .actions{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 6px;
    }

    button{
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
    }

    .msg{
      font-size: 14px;
      color: #111;
    }

    .gameArea{
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 6px 12px 14px;
      box-sizing: border-box;
      overflow: hidden; /* никаких скроллов */
    }

    .gridWrap{
      width: 100%;
      max-width: 980px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      /* даём сетке верхнюю часть экрана, чтобы подсказка точно помещалась снизу */
      flex: 0 0 auto;
    }

    #grid{
      display: flex;
      justify-content: center;
      align-items: center;
    }

    table{
      border-collapse: collapse;
      table-layout: fixed;
    }

    td{
      width: var(--cell);
      height: var(--cell);
      min-width: var(--cell);
      min-height: var(--cell);
      padding: 0;
      box-sizing: border-box;
      text-align: center;
      vertical-align: middle;
    }

    td.block{
      border: none !important;
      background: transparent !important;
    }

    td.fill{
      border: var(--border) solid #111;
      background: #fff;
    }

    td.gap{
      border: var(--border) solid #111;
      background: #d9d9d9; /* серые пробелы */
    }

    td.active{
      background: #fff2b3;
    }
    td.active.gap{
      background: #d9d9d9;
    }

    input.cell{
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      padding: 0;
      margin: 0;
      display: block;
      box-sizing: border-box;
      background: transparent;

      text-transform: uppercase;
      text-align: center;

      font-size: 16px; /* чтобы iOS не зумил */
      line-height: var(--cell);
      caret-color: #111;
    }

    .inlineClue{
      width: 100%;
      max-width: 980px;
      margin-top: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      box-sizing: border-box;
      flex: 0 0 auto;
    }

    .cluebar-top{
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .cluechip{
      display: inline-block;
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      color: #222;
      background: #fff;
    }

    .cluebar-text{
      font-size: 14px;
      line-height: 1.25;
      color: #111;
    }
    td.correct{
  background: #e8f0fe;              /* нежно-голубая подложка */
}
td.correct input.cell{
  color: #1a73e8;                    /* синие буквы */
}
td.correct.active{
  background: #dbeafe;              /* если слово выбрано — чуть ярче */
}
  </style>
</head>
<body>
  <div class="screen">
    <div class="top">
      <div class="panel">
        <div class="title">Кроссворд (EN)</div>
        <div class="note">Серые клетки — пробелы между словами. Тап по клетке выбирает слово, повторный тап переключает направление.</div>
        <div class="actions">
          <button id="checkBtn">Проверить</button>
          <button id="clearBtn">Очистить</button>
          <div class="msg" id="msg"></div>
        </div>
      </div>
    </div>

    <div class="gameArea">
      <div class="gridWrap" id="gridWrap">
        <div id="grid"></div>
      </div>

      <div class="inlineClue" id="inlineClue">
        <div class="cluebar-top">
          <span id="clueDir" class="cluechip">—</span>
        </div>
        <div id="clueText" class="cluebar-text">Нажмите на слово, чтобы увидеть подсказку</div>
      </div>
    </div>
  </div>

<script>
  function normalize(s){ return (s||"").toString().trim().toUpperCase(); }

  // Новый компактный макет как на твоей картинке + фраза целиком снизу
  const crossword = {
    width: 23,
    height: 14,
    gaps: [
      // MESSAGES FROM THE STARS (8) gap (4) gap (3) gap (5)
      { row: 14, col: 9 },   // между MESSAGES и FROM
      { row: 14, col: 14 },  // между FROM и THE
      { row: 14, col: 18 },  // между THE и STARS
    ],
    entries: [
      // верхний левый блок
      { id: 101, dir:"across", row: 3, col: 1,  answer:"PLAY",     clue:"Кнопка на пульте для включения кино" },
      { id: 102, dir:"down",   row: 2, col: 1,  answer:"SPF",      clue:"То, что Эльза не захотела покупать Владу" },

      // центральная вертикаль
      { id: 103, dir:"down",   row: 2, col: 3,  answer:"MADMEN",   clue:"Новый офисик" },

      // середина — длинное слово
      { id: 104, dir:"across", row: 5, col: 3,  answer:"MAYFLOWER", clue:"Полное имя Рубика" },

      // нижний левый блок
      { id: 105, dir:"across", row: 7, col: 1,  answer:"VPN",      clue:"Платное изобретение Яши и бесплатное Песочка" },
      { id: 106, dir:"down",   row: 7, col: 1,  answer:"VIBURNUM", clue:"Другое название калины (англ.)" },

      // фраза целиком как одно “слово” (подсветка всей фразы)
      { id: 201, dir:"across", row: 14, col: 1,  answer:"MESSAGES", group:"phrase", clue:"Название песни, под которую красиво катаются на роликах" },
      { id: 202, dir:"across", row: 14, col: 10, answer:"FROM",     group:"phrase", clue:"Название песни, под которую красиво катаются на роликах" },
      { id: 203, dir:"across", row: 14, col: 15, answer:"THE",      group:"phrase", clue:"Название песни, под которую красиво катаются на роликах" },
      { id: 204, dir:"across", row: 14, col: 19, answer:"STARS",    group:"phrase", clue:"Название песни, под которую красиво катаются на роликах" }
    ]
  };

  const W = crossword.width;
  const H = crossword.height;

  const gapSet = new Set((crossword.gaps||[]).map(g=>`${g.row-1},${g.col-1}`));

  const mask = Array.from({length:H}, ()=> Array.from({length:W}, ()=> false));
  const LOCK_CORRECT = false; // true = после правильного слова блокируем клетки

  function assertInBounds(r,c,label){
    if(r<0||r>=H||c<0||c>=W) throw new Error(`${label} выходит за границы ${W}x${H}`);
  }

  // gaps как видимые клетки
  for(const key of gapSet){
    const [r,c]=key.split(",").map(Number);
    assertInBounds(r,c,"gap");
    mask[r][c]=true;
  }

  function placeWord(e){
    const w = normalize(e.answer);
    for(let i=0;i<w.length;i++){
      const r = (e.row-1) + (e.dir==="down"? i : 0);
      const c = (e.col-1) + (e.dir==="across"? i : 0);
      assertInBounds(r,c,`Слово "${e.answer}"`);
      if(gapSet.has(`${r},${c}`)) throw new Error(`Слово "${e.answer}" попало в серую клетку`);
      mask[r][c]=true;
    }
  }
  crossword.entries.forEach(placeWord);

  // вычисляем bounding box, чтобы не рисовать лишнее поле
  let minR=H-1, maxR=0, minC=W-1, maxC=0;
  for(let r=0;r<H;r++){
    for(let c=0;c<W;c++){
      if(mask[r][c]){
        minR = Math.min(minR, r);
        maxR = Math.max(maxR, r);
        minC = Math.min(minC, c);
        maxC = Math.max(maxC, c);
      }
    }
  }

  const colsVisible = (maxC - minC + 1);
  const rowsVisible = (maxR - minR + 1);

  // рендер
  const gridEl = document.getElementById("grid");
  const table = document.createElement("table");

  const inputByKey = new Map();
  const tdByKey = new Map();

  for(let r=minR;r<=maxR;r++){
    const tr=document.createElement("tr");
    for(let c=minC;c<=maxC;c++){
      const td=document.createElement("td");
      const key = `${r},${c}`;

      if(!mask[r][c]){
        td.className="block";
      } else if(gapSet.has(key)){
        td.className="gap";
      } else {
        td.className="fill";
        const inp=document.createElement("input");
        inp.className="cell";
        inp.maxLength=1;
        inp.inputMode="text";
        inp.autocomplete="off";
        inp.spellcheck=false;

        inp.addEventListener("input", ()=>{
          inp.value = normalize(inp.value).slice(0,1);
        });

        td.appendChild(inp);
        inputByKey.set(key, inp);
      }

      tdByKey.set(key, td);
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
  gridEl.appendChild(table);

  // Размер клетки: считаем один раз по видимой зоне (без реакции на клавиатуру)
  function computeCellSizeOnce(){
    const wrap = document.getElementById("gridWrap");
    const clue = document.getElementById("inlineClue");
    const availableW = Math.floor(wrap.clientWidth);

    // доступная высота = высота gameArea - подсказка - небольшой запас
    const gameArea = document.querySelector(".gameArea");
    const availableH = Math.floor(gameArea.clientHeight - clue.offsetHeight - 18);

    const cellW = Math.floor(availableW / colsVisible);
    const cellH = Math.floor(availableH / rowsVisible);

    let cell = Math.min(cellW, cellH);
    cell = Math.max(18, Math.min(34, cell));

    document.documentElement.style.setProperty("--cell", `${cell}px`);
  }

  // делаем после первой отрисовки
  requestAnimationFrame(()=> {
    computeCellSizeOnce();
    // и ещё раз через микротик — iOS иногда поздно меряет
    setTimeout(computeCellSizeOnce, 50);
  });

  // подсказки и выбор слова
  const clueDir = document.getElementById("clueDir");
  const clueText = document.getElementById("clueText");

  const cellToEntries = new Map();
  function addCellEntry(r,c,entry){
    const key = `${r},${c}`;
    if(!cellToEntries.has(key)) cellToEntries.set(key, []);
    cellToEntries.get(key).push(entry);
  }

  crossword.entries.forEach(e=>{
    const w = normalize(e.answer);
    for(let i=0;i<w.length;i++){
      const r = (e.row-1) + (e.dir==="down"? i : 0);
      const c = (e.col-1) + (e.dir==="across"? i : 0);
      addCellEntry(r,c,e);
    }
  });

  let activeEntry = null;
  let lastTapKey = null;

  function clearActiveHighlight(){
    for(const td of tdByKey.values()) td.classList.remove("active");
  }

  function highlightEntry(entry){
    const w = normalize(entry.answer);
    for(let i=0;i<w.length;i++){
      const r = (entry.row-1) + (entry.dir==="down"? i : 0);
      const c = (entry.col-1) + (entry.dir==="across"? i : 0);
      const td = tdByKey.get(`${r},${c}`);
      if(td) td.classList.add("active");
    }
  }

  function highlightGroup(groupId){
    clearActiveHighlight();
    for(const e of crossword.entries){
      if(e.group === groupId) highlightEntry(e);
    }
  }
function setCellCorrect(key, isCorrect){
  const td = tdByKey.get(key);
  const inp = inputByKey.get(key);
  if(!td || !inp) return;
  td.classList.toggle("correct", !!isCorrect);
  if(LOCK_CORRECT) inp.disabled = !!isCorrect;
}

function keysForEntry(entry){
  return getPathCells(entry); // у тебя уже есть getPathCells()
}

function keysForGroup(groupId){
  const parts = crossword.entries
    .filter(e => e.group === groupId && e.dir === "across")
    .sort((a,b)=> (a.row-b.row) || (a.col-b.col));
  const all = [];
  for(const p of parts) all.push(...keysForEntry(p));
  return all;
}

function isEntryFilledAndCorrect(entry){
  const ans = normalize(entry.answer);
  const keys = keysForEntry(entry);
  for(let i=0;i<keys.length;i++){
    if(getCellValueKey(keys[i]) !== ans[i]) return false;
  }
  return true;
}

function isGroupFilledAndCorrect(groupId){
  const parts = crossword.entries
    .filter(e => e.group === groupId && e.dir === "across")
    .sort((a,b)=> (a.row-b.row) || (a.col-b.col));

  // сравниваем каждую часть отдельно (MESSAGES / FROM / THE / STARS)
  for(const p of parts){
    if(!isEntryFilledAndCorrect(p)) return false;
  }
  return true;
}

function updateCorrectMarks(){
  // сначала снимем "correct" со всех (и вернём disabled=false если LOCK_CORRECT)
  for(const [key, inp] of inputByKey.entries()){
    const td = tdByKey.get(key);
    if(td) td.classList.remove("correct");
    if(LOCK_CORRECT) inp.disabled = false;
  }

  // отметим правильные одиночные слова
  for(const e of crossword.entries){
    if(e.group) continue; // группу обработаем ниже
    if(isEntryFilledAndCorrect(e)){
      for(const key of keysForEntry(e)) setCellCorrect(key, true);
    }
  }

  // отметим правильные группы-фразы
  const groupIds = new Set(crossword.entries.filter(e=>e.group).map(e=>e.group));
  for(const gid of groupIds){
    if(isGroupFilledAndCorrect(gid)){
      for(const key of keysForGroup(gid)) setCellCorrect(key, true);
    }
  }
}
  function showClue(entry){
    clueDir.textContent = entry.dir === "across" ? "По горизонтали" : "По вертикали";
    clueText.textContent = entry.clue;

    if(entry.group) highlightGroup(entry.group);
    else { clearActiveHighlight(); highlightEntry(entry); }

    activeEntry = entry;
  }

  function pickEntryForCellKey(key){
    const list = cellToEntries.get(key) || [];
    if(list.length === 0) return null;

    // повторный тап — переключаем только если реально есть выбор
    if(lastTapKey === key && list.length > 1 && activeEntry){
      const idx = list.findIndex(x => x === activeEntry);
      if(idx >= 0) return list[(idx + 1) % list.length];
      return list[1];
    }

    // по умолчанию — текущая, если подходит, иначе across, иначе первая
    if(activeEntry){
      const okSame = list.some(x => x === activeEntry);
      const okGroup = activeEntry.group && list.some(x => x.group === activeEntry.group);
      if(okSame || okGroup) return activeEntry;
    }

    const across = list.find(x => x.dir === "across");
    return across || list[0];
  }

  function focusNoJump(inp){
    try { inp.focus({ preventScroll: true }); }
    catch { inp.focus(); }
  }

  function getPathCells(entry){
    const keys = [];
    const w = normalize(entry.answer);
    for(let i=0;i<w.length;i++){
      const r = (entry.row-1) + (entry.dir==="down"? i : 0);
      const c = (entry.col-1) + (entry.dir==="across"? i : 0);
      keys.push(`${r},${c}`);
    }
    return keys;
  }

  function moveInActive(entry, currentKey, delta){
    if(!entry) return;

    // если это группа-фраза — двигаемся по всей фразе слева направо
    if(entry.group){
      const parts = crossword.entries
        .filter(e=>e.group===entry.group && e.dir===entry.dir)
        .sort((a,b)=> (a.row-b.row) || (a.col-b.col));
      const allKeys = [];
      for(const p of parts) allKeys.push(...getPathCells(p));

      const i = allKeys.indexOf(currentKey);
      const next = allKeys[i + delta];
      if(next && inputByKey.get(next)) focusNoJump(inputByKey.get(next));
      return;
    }

    const keys = getPathCells(entry);
    const idx = keys.indexOf(currentKey);
    const next = keys[idx + delta];
    if(next && inputByKey.get(next)) focusNoJump(inputByKey.get(next));
  }

  // обработчики на клетки
  for(const [key, inp] of inputByKey.entries()){
    function selectByTap(){
      lastTapKey = key;
      const entry = pickEntryForCellKey(key);
      if(entry) showClue(entry);
      focusNoJump(inp);
    }

    function onFocusOnly(){
      // при автопереходе просто держим выбранное слово, не переключаем на пересечение
      if(!activeEntry) return;
      const list = cellToEntries.get(key) || [];
      const okSame = list.some(x => x === activeEntry);
      const okGroup = activeEntry.group && list.some(x => x.group === activeEntry.group);
      if(okSame || okGroup){
        if(activeEntry.group) highlightGroup(activeEntry.group);
        else { clearActiveHighlight(); highlightEntry(activeEntry); }
      }
    }

    inp.addEventListener("click", selectByTap);
    inp.addEventListener("touchend", selectByTap, {passive:true});
    inp.addEventListener("focus", onFocusOnly);

    // автопереход вперёд после ввода
inp.addEventListener("input", () => {
  if(!activeEntry) return;
  const v = normalize(inp.value);
  if(v && v.length === 1){
    moveInActive(activeEntry, key, +1);
  }
  updateCorrectMarks();
});
    // backspace: если пусто — шаг назад
    inp.addEventListener("keydown", (e) => {
      if(e.key === "Backspace"){
        if(inp.value === "" && activeEntry){
          e.preventDefault();
          moveInActive(activeEntry, key, -1);
        }
      }
    });
  }

  // check/clear
  function getCellValueKey(key){
    const inp = inputByKey.get(key);
    return inp ? normalize(inp.value) : "";
  }

 function check(){
  let ok=0, total=0;

  // считаем только буквенные клетки (без серых)
  const seen = new Set();
  crossword.entries.forEach(e=>{
    const w = normalize(e.answer);
    for(let i=0;i<w.length;i++){
      const r = (e.row-1) + (e.dir==="down"? i : 0);
      const c = (e.col-1) + (e.dir==="across"? i : 0);
      const key = `${r},${c}`;
      if(seen.has(key)) continue;
      seen.add(key);

      total++;
      if(getCellValueKey(key) === w[i]) ok++;
    }
  });

  document.getElementById("msg").textContent =
    (ok===total && total>0) ? "Готово! Всё верно 🎉" : `Верно: ${ok} из ${total} букв`;

  updateCorrectMarks(); // <-- добавь это
}

  function clearAll(){
    for(const inp of inputByKey.values()) inp.value = "";
    document.getElementById("msg").textContent = "";
    clearActiveHighlight();
    activeEntry = null;
    lastTapKey = null;
    clueDir.textContent = "—";
    clueText.textContent = "Нажмите на слово, чтобы увидеть подсказку";
    updateCorrectMarks();
  }

  document.getElementById("checkBtn").addEventListener("click", check);
  document.getElementById("clearBtn").addEventListener("click", clearAll);
  updateCorrectMarks();
</script>
</body>
</html>
